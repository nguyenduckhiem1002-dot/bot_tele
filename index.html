<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>SAP Chart Bot</title>
  <style>
    body { font-family: system-ui; background: #f8fafc; display: flex;
           justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
            padding: 40px; max-width: 500px; text-align: center; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .status { color: #16a34a; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📊 SAP Chart Bot</h1>
    <p class="status">● Running</p>
    <p>POST JSON to <code>/api/chart</code></p>
    <p>Health check: <code>/api/health</code></p>
  </div>
</body>
</html>
